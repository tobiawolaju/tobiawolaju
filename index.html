<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tobi's Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <!-- Bio Section -->
  <section id="bio-section" class="glass-section">
    <div class="bio-container">
      <div id="profile-pic-container"></div>
      <h3 id="profile-name"></h3>
      <p id="profile-title"></p>
    </div>
  </section>

  <!-- About Me -->
  <section id="about-me" class="glass-section visible">
    <h2 class="toggle">About<a class="arrow">↗</a></h2>
    <div class="hidden" id="about-content"></div>
  </section>

  <!-- Projects -->
  <section id="projects-section" class="glass-section visible">
    <h2 class="toggle">Projects<a class="arrow">↗</a></h2>
    <div class="hidden">
      <div class="filters" id="project-filters"></div>
      <div class="pjet" id="projects-list"></div>
    </div>
  </section>

  <!-- Docs -->
  <section id="docs-section" class="glass-section visible">
    <h2 class="toggle">Docs<a class="arrow">↗</a></h2>
    <div class="hidden">
      <ul id="docs-list"></ul>
    </div>
  </section>

  <!-- GitHub Activity -->
  <section id="activity-section" class="glass-section">
    <h2 class="toggle">Git<a class="arrow">↗</a></h2>
    <div class="activity-container">
      <a href="https://github.com/tobiawolaju" target="_blank">
        <img src="https://ghchart.rshah.org/tobiawolaju" alt="GitHub Contributions Chart">
      </a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="glass-footer">
    <a href="mailto:tobiawolaju21@gmail.com"><img src="https://img.icons8.com/ios-filled/24/ffffff/gmail.png" alt="Gmail" />Gmail</a>
    <a href="https://www.linkedin.com/in/tobiawolaju" target="_blank"><img src="https://img.icons8.com/ios-filled/24/ffffff/linkedin.png" alt="LinkedIn" />LinkedIn</a>
    <a href="https://x.com/tobiawolaju?s=09" target="_blank"><img src="https://img.icons8.com/ios-filled/24/ffffff/twitterx.png" alt="X" />X</a>
    <a href="https://github.com/tobiawolaju" target="_blank"><img src="https://img.icons8.com/ios-filled/24/ffffff/github.png" alt="GitHub" />GitHub</a>
  </footer>

</body>
</html>
